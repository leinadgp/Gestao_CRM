<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Gestão na Prática</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1F4E79;
            --secondary: #28a745;
            --text: #333;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #fff;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 8px solid var(--primary);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(31, 78, 121, 0.1);
        }

        /* --- Estilos da Caixa de Módulos --- */
        .modulos-box {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
        }

        .modulo-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .modulo-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .modulo-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            cursor: pointer;
        }

        .modulo-info {
            display: flex;
            flex-direction: column;
        }

        .modulo-nome {
            font-weight: bold;
            color: var(--primary);
            font-size: 0.95rem;
        }

        .modulo-valor {
            font-size: 0.85rem;
            color: #666;
        }

        .loading-modulos {
            text-align: center;
            color: #999;
            font-size: 0.85rem;
        }
        /* --------------------------------------------- */

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #218838;
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .footer-info {
            text-align: center;
            font-size: 0.75rem;
            color: #999;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="tituloCurso">Carregando Curso...</h1>
        <p id="descCurso">Aguarde enquanto preparamos os dados.</p>
    </div>

    <form id="formInscricao" style="display: none;">
        <div class="form-group">
            <label>Nome Completo</label>
            <div class="input-icon">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="nome" placeholder="Seu nome aqui" required>
            </div>
        </div>

        <div class="form-group">
            <label>E-mail Corporativo/Pessoal</label>
            <div class="input-icon">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="exemplo@email.com" required>
            </div>
        </div>

        <div class="form-group">
            <label>WhatsApp (com DDD)</label>
            <div class="input-icon">
                <i class="fa-brands fa-whatsapp"></i>
                <input type="text" id="whatsapp" placeholder="(00) 00000-0000" required>
            </div>
        </div>

        <div class="form-group">
            <label>Cidade / Prefeitura</label>
            <div class="input-icon">
                <i class="fa-solid fa-location-dot"></i>
                <input type="text" id="cidade" placeholder="Sua cidade - UF" required>
            </div>
        </div>

        <div class="form-group">
            <label><i class="fa-solid fa-book" style="color: var(--primary);"></i> Módulos do Curso</label>
            <div id="containerModulos" class="modulos-box">
                <div class="loading-modulos">
                    <i class="fa-solid fa-circle-notch fa-spin"></i> Buscando módulos...
                </div>
            </div>
        </div>

        <button type="submit" id="btnSubmit">FINALIZAR INSCRIÇÃO</button>
    </form>

    <div id="feedback"></div>

    <p class="footer-info">
        <i class="fa-solid fa-shield-halved"></i> Seus dados estão protegidos pela LGPD.
    </p>
</div>

<script>
    const API_URL = 'https://server-js-gestao.onrender.com';
    
    // Captura o ID da campanha/curso diretamente da URL (?curso=7)
    const urlParams = new URLSearchParams(window.location.search);
    const cursoId = urlParams.get('curso');

    const containerModulos = document.getElementById('containerModulos');
    const form = document.getElementById('formInscricao');
    const tituloCurso = document.getElementById('tituloCurso');
    const descCurso = document.getElementById('descCurso');

    // 1. CARREGAR DADOS DO CURSO E MÓDULOS DINAMICAMENTE
    async function carregarDadosDoCurso() {
        if (!cursoId) {
            tituloCurso.innerText = "Curso não informado";
            descCurso.innerText = "Por favor, acesse esta página usando um link válido.";
            containerModulos.innerHTML = '';
            return;
        }

        try {
            // Chama a rota pública que criamos no server.js
            const res = await fetch(`${API_URL}/api/publico/campanha/${cursoId}`);
            
            if (!res.ok) throw new Error("Curso não encontrado ou indisponível.");
            
            const dados = await res.json();

            // Atualiza Títulos
            tituloCurso.innerText = dados.curso.nome;
            descCurso.innerText = "Preencha os dados abaixo para validar sua participação.";
            document.title = "Inscrição - " + dados.curso.nome;

            // Renderiza Módulos
            if (dados.modulos && dados.modulos.length > 0) {
                containerModulos.innerHTML = ''; // Limpa o "Buscando..."
                
                dados.modulos.forEach(mod => {
                    const valorFormatado = Number(mod.valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    
                    containerModulos.innerHTML += `
                        <label class="modulo-item">
                            <input type="checkbox" name="modulo_id" value="${mod.id}" checked>
                            <div class="modulo-info">
                                <span class="modulo-nome">${mod.nome}</span>
                                <span class="modulo-valor">Investimento: ${valorFormatado}</span>
                            </div>
                        </label>
                    `;
                });
            } else {
                containerModulos.innerHTML = '<p style="text-align:center; color:#999; margin:0; font-size:0.9rem;">Curso sem módulos extras.</p>';
            }

            // Exibe o formulário após carregar tudo
            form.style.display = 'block';

        } catch (error) {
            tituloCurso.innerText = "Ops, algo deu errado";
            tituloCurso.style.color = "red";
            descCurso.innerText = error.message;
            containerModulos.innerHTML = '';
        }
    }

    // Chama a função assim que o script carrega
    carregarDadosDoCurso();


    // 2. ENVIAR FORMULÁRIO COM OS MÓDULOS SELECIONADOS
    const feedback = document.getElementById('feedback');
    const btn = document.getElementById('btnSubmit');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Bloqueia botão e limpa avisos
        btn.disabled = true;
        btn.innerText = "PROCESSANDO...";
        feedback.style.display = "none";

        // Pega as checkboxes marcadas
        const checkboxes = document.querySelectorAll('input[name="modulo_id"]:checked');
        const modulosSelecionados = Array.from(checkboxes).map(cb => parseInt(cb.value));

        const payload = {
            nome: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            whatsapp: document.getElementById('whatsapp').value,
            cidade: document.getElementById('cidade').value,
            curso_id: parseInt(cursoId),
            modulos_ids: modulosSelecionados
        };

        try {
            const response = await fetch(`${API_URL}/webhook/inscricao-externa`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (response.ok) {
                feedback.className = "success";
                feedback.innerHTML = "<strong>Sucesso!</strong> Sua inscrição foi processada. Em breve entraremos em contato.";
                feedback.style.display = "block";
                
                form.reset();
                containerModulos.style.opacity = "0.5";
                
                // Esconde o botão para evitar cliques duplicados após sucesso
                btn.style.display = "none"; 
            } else {
                throw new Error(result.erro || "Erro ao processar. Tente novamente.");
            }

        } catch (error) {
            feedback.className = "error";
            feedback.innerHTML = "<strong>Atenção:</strong> " + error.message;
            feedback.style.display = "block";
        } finally {
            btn.disabled = false;
            if (btn.style.display !== "none") btn.innerText = "FINALIZAR INSCRIÇÃO";
        }
    });
</script>

</body>
</html>
